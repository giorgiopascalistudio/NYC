<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYC Itinerario - Stoic Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #fafaf8;
            --text-dark: #1a1a1a;
            --text-light: #888;
            --border: #e0e0dc;
            --accent: #2a2a2a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text-dark);
            line-height: 1.6;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* HOME PAGE */
        .home-page {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow-y: auto;
            padding: 40px 20px;
        }

        .home-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .home-header h1 {
            font-size: 3em;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .home-header p {
            color: var(--text-light);
            font-size: 0.95em;
            letter-spacing: 0.5px;
        }

        .days-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .day-card {
            aspect-ratio: 1;
            border: 1px solid var(--border);
            border-radius: 0;
            padding: 24px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.2s ease;
            background: white;
        }

        .day-card:hover {
            border-color: var(--accent);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .day-card-number {
            font-size: 2.5em;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .day-card-tema {
            font-size: 0.75em;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.4;
        }

        /* DAY DETAIL PAGE */
        .day-detail-page {
            display: none;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .day-detail-header {
            padding: 40px 20px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .day-detail-header button {
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-size: 0.9em;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: color 0.2s;
        }

        .day-detail-header button:hover {
            color: var(--text-dark);
        }

        .day-detail-title {
            font-size: 2.5em;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .day-detail-date {
            color: var(--text-light);
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .day-detail-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px;
        }

        .day-tema-box {
            background: white;
            border: 1px solid var(--border);
            padding: 24px;
            margin-bottom: 30px;
            border-radius: 0;
        }

        .day-tema-label {
            color: var(--text-light);
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: block;
        }

        .day-tema-text {
            font-size: 1.2em;
            font-weight: 500;
        }

        .day-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }

        .stat-box {
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 0;
            background: white;
        }

        .stat-label {
            color: var(--text-light);
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: block;
        }

        .stat-value {
            font-size: 1.3em;
            font-weight: 500;
        }

        .day-detail-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            background: white;
        }

        .btn-go {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 0;
            font-size: 1em;
            font-weight: 500;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-go:hover {
            background: #444;
        }

        /* FULLSCREEN ITINERARY */
        .fullscreen-itinerary {
            display: none;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            background: white;
        }

        .fullscreen-header {
            padding: 30px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .fullscreen-title {
            font-size: 1.5em;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .fullscreen-close {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2em;
            color: var(--text-light);
            transition: color 0.2s;
        }

        .fullscreen-close:hover {
            color: var(--text-dark);
        }

        .activities-carousel {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .activity-step {
            padding: 40px 20px;
            border-bottom: 1px solid var(--border);
            min-height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .activity-step:last-child {
            border-bottom: none;
        }

        .activity-time {
            color: var(--text-light);
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .activity-title {
            font-size: 2.2em;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            line-height: 1.3;
        }

        .activity-details {
            display: grid;
            gap: 20px;
            margin-bottom: 24px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .detail-label {
            color: var(--text-light);
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex: 0 0 35%;
        }

        .detail-value {
            flex: 1;
            font-size: 0.95em;
            text-align: right;
            line-height: 1.5;
        }

        .activity-note {
            background: #f5f5f3;
            border-left: 2px solid var(--accent);
            padding: 16px;
            margin-bottom: 24px;
            font-size: 0.9em;
            line-height: 1.6;
        }

        .activity-info {
            background: #f5f5f3;
            padding: 24px;
            margin-bottom: 24px;
            border-radius: 0;
            font-size: 0.9em;
            line-height: 1.7;
            color: #555;
        }

        .activity-info h4 {
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            color: var(--text-dark);
        }

        .activity-info ul {
            margin-left: 20px;
            margin-bottom: 12px;
        }

        .activity-info li {
            margin-bottom: 8px;
        }

        .activity-info li:last-child {
            margin-bottom: 0;
        }

        .fullscreen-nav {
            padding: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            background: white;
            flex-shrink: 0;
        }

        .nav-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            border-color: var(--accent);
            background: #f5f5f3;
        }

        .nav-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .nav-counter {
            text-align: center;
            padding: 12px;
            color: var(--text-light);
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media (max-width: 768px) {
            .home-header h1 {
                font-size: 2em;
            }

            .days-container {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            }

            .day-detail-title {
                font-size: 1.8em;
            }

            .activity-title {
                font-size: 1.5em;
            }

            .detail-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .detail-value {
                text-align: left;
                margin-top: 8px;
            }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-light);
        }
    </style>
</head>

                    <div class="stat-box">

                        <span class="stat-value" id="detailCost">$60</span>
                    </div>
                </div>
                <div id="activitiesSummary"></div>
            </div>
            <div class="day-detail-footer">
                <button class="btn-go" onclick="startItinerary()">Go</button>
            </div>
        </div>

        <!-- FULLSCREEN ITINERARY -->
        <div class="fullscreen-itinerary" id="fullscreenItinerary">
            <div class="fullscreen-header">
                <div class="fullscreen-title" id="itineraryTitle">Giorno 1</div>

            <div class="activities-carousel" id="activitiesCarousel"></div>
            <div class="fullscreen-nav">
                <button class="nav-btn" id="prevBtn" onclick="previousActivity()">← Precedente</button>
                <div class="nav-counter" id="counter">1/8</div>
                <button class="nav-btn" id="nextBtn" onclick="nextActivity()">Successivo →</button>
            </div>
        </div>
    </div>

        let currentDay = null;
        let currentActivityIndex = 0;

        // Render home page
        function renderHome() {
            const container = document.getElementById('daysContainer');
            container.innerHTML = '';
            for (let i = 1; i <= 8; i++) {
                const data = itinerario[i];
                const card = document.createElement('div');
                card.className = 'day-card';
                card.onclick = () => showDayDetail(i);
                card.innerHTML = `
                    <div class="day-card-number">${i}</div>
                    <div class="day-card-tema">${data.tema}</div>
                `;
                container.appendChild(card);
            }
        }

        function showDayDetail(day) {
            currentDay = day;
            const data = itinerario[day];

            document.getElementById('detailTitle').textContent = `Giorno ${day}`;
            document.getElementById('detailDate').textContent = data.data;
            document.getElementById('detailTema').textContent = data.tema;
            document.getElementById('detailTime').textContent = data.tempoAttivo;
            document.getElementById('detailCost').textContent = data.costo;

            const summary = document.getElementById('activitiesSummary');
            summary.innerHTML = '<div style="color: var(--text-light); font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; display: block;">ATTIVITÀ DELLA GIORNATA</div>';
            data.activities.forEach((activity, idx) => {
                const div = document.createElement('div');
                div.style.cssText = 'padding: 16px; border-bottom: 1px solid var(--border); font-size: 0.9em;';
                div.innerHTML = `
                    <div style="font-weight: 500; margin-bottom: 4px;">${activity.title}</div>
                    <div style="color: var(--text-light); font-size: 0.85em;">${activity.time}</div>
                `;
                summary.appendChild(div);
            });

            document.getElementById('homePage').style.display = 'none';
            document.getElementById('dayDetailPage').style.display = 'flex';
        }

        function goHome() {
            document.getElementById('homePage').style.display = 'flex';
            document.getElementById('dayDetailPage').style.display = 'none';
            document.getElementById('fullscreenItinerary').style.display = 'none';
        }

        function startItinerary() {
            currentActivityIndex = 0;
            renderItinerary();
            document.getElementById('dayDetailPage').style.display = 'none';
            document.getElementById('fullscreenItinerary').style.display = 'flex';
        }

        function renderItinerary() {
            const data = itinerario[currentDay];
            document.getElementById('itineraryTitle').textContent = `Giorno ${currentDay}`;

            const carousel = document.getElementById('activitiesCarousel');
            carousel.innerHTML = '';

            data.activities.forEach((activity, idx) => {
                const step = document.createElement('div');
                step.className = 'activity-step';
                step.innerHTML = `
                    <div>
                        <div class="activity-time">${activity.time}</div>
                        <div class="activity-title">${activity.title}</div>
                        
                        <div class="activity-details">
                            <div class="detail-row">
                                <div class="detail-label">Durata</div>
                                <div class="detail-value">${activity.duration}</div>
                            </div>
                            <div class="detail-row">
                                <div class="detail-label">Costo</div>
                                <div class="detail-value">${activity.cost}</div>
                            </div>
                        </div>

                        ${activity.note ? `<div class="activity-note">📌 ${activity.note}</div>` : ''}
                        ${activity.info ? `<div class="activity-info">${activity.info}</div>` : ''}
                    </div>
                `;
                carousel.appendChild(step);
            });

            updateNav();
        }

        function updateNav() {
            const data = itinerario[currentDay];
            const total = data.activities.length;
            document.getElementById('counter').textContent = `${currentActivityIndex + 1}/${total}`;
            document.getElementById('prevBtn').classList.toggle('disabled', currentActivityIndex === 0);
            document.getElementById('nextBtn').classList.toggle('disabled', currentActivityIndex === total - 1);
        }

        function nextActivity() {
            const data = itinerario[currentDay];
            if (currentActivityIndex < data.activities.length - 1) {
                currentActivityIndex++;
                const carousel = document.getElementById('activitiesCarousel');
                const steps = carousel.querySelectorAll('.activity-step');
                carousel.scrollTo({ top: steps[currentActivityIndex].offsetTop - 40, behavior: 'smooth' });
                updateNav();
            }
        }

        function previousActivity() {
            if (currentActivityIndex > 0) {
                currentActivityIndex--;
                const carousel = document.getElementById('activitiesCarousel');
                const steps = carousel.querySelectorAll('.activity-step');
                carousel.scrollTo({ top: steps[currentActivityIndex].offsetTop - 40, behavior: 'smooth' });
                updateNav();
            }
        }

        function closeItinerary() {
            showDayDetail(currentDay);
        }

        // Init
        renderHome();
    </script>
